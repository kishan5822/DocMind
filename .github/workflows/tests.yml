name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.12" ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Tesseract OCR
      run: sudo apt-get install -y tesseract-ocr

    - name: Run validation tests
      run: python -m tests.test_validation

    - name: Run pipeline tests
      run: python -m tests.test_pipeline

    - name: Run API key audit
      run: python -m tests.test_api_key_audit

    - name: Run generation tests (skip if no API key)
      run: python -m tests.test_generation
      if: ${{ secrets.GROQ_API_KEY != '' }}
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

    - name: Run end-to-end tests (skip if no API key)
      run: python -m tests.test_e2e
      if: ${{ secrets.GROQ_API_KEY != '' }}
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
