services:
  - type: web
    name: docmind-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: JWT_SECRET
        generateValue: true
      - key: APP_SECRET_KEY
        generateValue: true
      - key: WEB_ORIGINS
        value: https://docmind.vercel.app
      - key: GROQ_API_KEY
        sync: false
      - key: DATA_DIR
        value: .docmind_data
